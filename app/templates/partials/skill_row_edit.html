<td colspan="4">
  <div class="field-row" style="align-items: flex-end; flex-wrap: wrap;">
    <div class="field">
      <label>Nom</label>
      <input type="text" name="nom" value="{{ item.nom }}" required>
    </div>
    <div class="field">
      <label>Niveau actuel</label>
      <select name="niveau_actuel">
          {% for niveau in ["débutant", "intermédiaire", "avancé"] %}
              <option value="{{ niveau }}" {% if item.niveau_actuel == niveau %}selected{% endif %}>
                  {{ niveau|capitalize }}
              </option>
          {% endfor %}
      </select>
    </div>
    <div class="checkbox-row" style="margin-bottom: 0.6rem;">
      <input type="checkbox" id="envie_{{ item.id }}" name="est_envie_apprentissage" {{ 'checked' if item.est_envie_apprentissage else '' }}>
      <label for="envie_{{ item.id }}">C'est une envie d'apprentissage</label>
    </div>
    <div class="field" style="flex-direction: row; gap: 0.5rem;">
      <button type="button" class="btn-sm btn-primary" hx-patch="/skills/{{ item.id }}" hx-include="closest tr" hx-target="#skill-{{ item.id }}" hx-swap="innerHTML">Enregistrer</button>
      <button type="button" class="btn-sm btn-ghost" hx-get="/skills/{{ item.id }}/view" hx-target="#skill-{{ item.id }}" hx-swap="innerHTML">Annuler</button>
    </div>
  </div>
</td>
