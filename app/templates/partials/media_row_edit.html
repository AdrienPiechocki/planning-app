<td colspan="6">
  <div class="field-row" style="align-items: flex-end; flex-wrap: wrap;">
    <div class="field">
      <label>Titre</label>
      <input type="text" name="titre" value="{{ item.titre }}" required>
    </div>
    <div class="field">
      <label>Type</label>
      <select name="type">
        <option value="jeu_video" {{ 'selected' if item.type.value == 'jeu_video' else '' }}>Jeu vidéo</option>
        <option value="film" {{ 'selected' if item.type.value == 'film' else '' }}>Film</option>
        <option value="serie" {{ 'selected' if item.type.value == 'serie' else '' }}>Série</option>
      </select>
    </div>
    <div class="field">
      <label>Statut</label>
      <select name="statut">
        <option value="a_faire" {{ 'selected' if item.statut.value == 'a_faire' else '' }}>À faire</option>
        <option value="en_cours" {{ 'selected' if item.statut.value == 'en_cours' else '' }}>En cours</option>
        <option value="termine" {{ 'selected' if item.statut.value == 'termine' else '' }}>Terminé</option>
      </select>
    </div>
    <div class="field">
      <label>Durée session (min)</label>
      <input type="number" name="duree_session_minutes" value="{{ item.duree_session_minutes }}">
    </div>
    <div class="field">
      <label>Séances restantes</label>
      <input type="number" name="sessions_restantes" min="0" value="{{ item.sessions_restantes if item.sessions_restantes is not none else '' }}" placeholder="illimité">
    </div>
    <div class="field" style="flex-direction: row; gap: 0.5rem;">
      <button type="button" class="btn-sm btn-primary" hx-patch="/media/{{ item.id }}" hx-include="closest tr" hx-target="#media-{{ item.id }}" hx-swap="innerHTML">Enregistrer</button>
      <button type="button" class="btn-sm btn-ghost" hx-get="/media/{{ item.id }}/view" hx-target="#media-{{ item.id }}" hx-swap="innerHTML">Annuler</button>
    </div>
  </div>
</td>
